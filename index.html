<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Browse LEGO listings. Search, filter, and sort. No checkout — DM to buy." />
  <title>brickmonster — LEGO for Sale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Interactive particle canvas -->
  <canvas id="particles"></canvas>
  
  <!-- Floating LEGO bricks decoration -->
  <div class="floating-bricks" aria-hidden="true">
    <div class="brick brick--1"></div>
    <div class="brick brick--2"></div>
    <div class="brick brick--3"></div>
    <div class="brick brick--4"></div>
    <div class="brick brick--5"></div>
  </div>
  
  <header class="header">
    <div class="container header__inner">
      <div class="brand brand--withLogo">
        <img class="brand__logo" src="assets/logo.png" alt="brickmonster" />
        <div class="brand__text">
          <h1 id="siteTitle" class="title">LEGO for Sale</h1>
          <p id="siteSubtitle" class="subtitle">Browse listings • DM to buy</p>
        </div>
      </div>
      <div class="contact">
        <a id="igLink" class="btn btn--ghost" href="#" target="_blank" rel="noopener">Instagram</a>
        <a id="emailLink" class="btn btn--ghost" href="mailto:bainzxl@gmail.com">Email</a>
        <a id="dmLink" class="btn" href="#">DM Me</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h2 class="hero__title"><span>Build Your</span> Collection</h2>
      <p class="hero__sub">Premium LEGO sets & minifigures from Toronto</p>
    </section>
    
    <section class="controls" aria-label="Search and filters">
      <div class="controls__row">
        <label class="field">
          <span class="field__label">Search</span>
          <input id="q" class="input" type="search" placeholder="Search (name, set #, tags)…" autocomplete="off" />
        </label>

        <label class="field">
          <span class="field__label">Category</span>
          <select id="category" class="select" aria-label="Category">
            <option value="">All categories</option>
          </select>
        </label>

        <label class="field">
          <span class="field__label">Condition</span>
          <select id="condition" class="select" aria-label="Condition">
            <option value="">Any</option>
          </select>
        </label>

        <label class="field">
          <span class="field__label">Series</span>
          <select id="series" class="select" aria-label="Series">
            <option value="">All series</option>
          </select>
        </label>
      </div>

      <div class="controls__row controls__row--2">
        <label class="field">
          <span class="field__label">Price min</span>
          <input id="priceMin" class="input" inputmode="numeric" placeholder="0" />
        </label>
        <label class="field">
          <span class="field__label">Price max</span>
          <input id="priceMax" class="input" inputmode="numeric" placeholder="500" />
        </label>

        <label class="field">
          <span class="field__label">Sort</span>
          <select id="sort" class="select" aria-label="Sort">
            <option value="newest">Newest</option>
            <option value="price_asc">Price: low → high</option>
            <option value="price_desc">Price: high → low</option>
          </select>
        </label>

        <label class="field field--check" for="inStockOnly">
          <span class="field__label">&nbsp;</span>
          <span class="check">
            <input id="inStockOnly" type="checkbox" />
            <span>In stock only</span>
          </span>
        </label>

        <div class="field field--actions">
          <span class="field__label">&nbsp;</span>
          <button id="clear" class="btn btn--ghost" type="button">Clear</button>
        </div>
      </div>

    </section>

    <section>
      <div class="statsbar">
        <div id="stats" class="stats" aria-live="polite"></div>
        <div id="activeFilters" class="chips" aria-label="Active filters"></div>
      </div>
      <div id="grid" class="grid" aria-label="Listings"></div>
      <div id="empty" class="empty" hidden>
        <p>No listings match that. Try clearing filters.</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <span class="muted">Questions? Email <a class="link" href="mailto:bainzxl@gmail.com">bainzxl@gmail.com</a></span>
    </div>
  </footer>

  <script src="script.js" defer></script>
<script>
// ============================================
// Interactive Particle System - LEGO Bricks
// ============================================
(function() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let mouseX = 0, mouseY = 0;
  
  const colors = ['#d42a2a', '#ffd700', '#0055bf', '#00852b', '#ff6b00', '#ff4755'];
  
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  
  class Particle {
    constructor() {
      this.reset();
    }
    
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 8 + 4;
      this.speedX = (Math.random() - 0.5) * 0.5;
      this.speedY = Math.random() * 0.5 + 0.2;
      this.color = colors[Math.floor(Math.random() * colors.length)];
      this.opacity = Math.random() * 0.4 + 0.1;
      this.rotation = Math.random() * Math.PI * 2;
      this.rotationSpeed = (Math.random() - 0.5) * 0.02;
    }
    
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      this.rotation += this.rotationSpeed;
      
      // Mouse interaction
      const dx = mouseX - this.x;
      const dy = mouseY - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100) {
        this.x -= dx * 0.01;
        this.y -= dy * 0.01;
      }
      
      if (this.y > canvas.height + 20) {
        this.y = -20;
        this.x = Math.random() * canvas.width;
      }
      if (this.x < -20) this.x = canvas.width + 20;
      if (this.x > canvas.width + 20) this.x = -20;
    }
    
    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.globalAlpha = this.opacity;
      ctx.fillStyle = this.color;
      ctx.fillRect(-this.size/2, -this.size/4, this.size, this.size/2);
      // Brick studs
      ctx.beginPath();
      ctx.arc(-this.size/4, -this.size/4 - 2, this.size/5, 0, Math.PI * 2);
      ctx.arc(this.size/4, -this.size/4 - 2, this.size/5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
  
  function init() {
    resize();
    for (let i = 0; i < 25; i++) {
      particles.push(new Particle());
    }
    animate();
  }
  
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.update();
      p.draw();
    });
    requestAnimationFrame(animate);
  }
  
  window.addEventListener('resize', resize);
  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });
  
  init();
})();

// ============================================
// Card Hover Sound Effect (visual feedback)
// ============================================
document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('mouseenter', () => {
    card.style.transition = 'all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1)';
  });
});

// ============================================
// Staggered Grid Animation on Load
// ============================================
function animateGrid() {
  const cards = document.querySelectorAll('.card');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, index) => {
      if (entry.isIntersecting) {
        setTimeout(() => {
          entry.target.style.opacity = '1';
          entry.target.style.transform = 'translateY(0) scale(1)';
        }, index * 60);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });
  
  cards.forEach(card => {
    card.style.opacity = '0';
    card.style.transform = 'translateY(30px) scale(0.95)';
    card.style.transition = 'all 0.5s cubic-bezier(0.34, 1.2, 0.64, 1)';
    observer.observe(card);
  });
}

// Run after grid loads
setTimeout(animateGrid, 300);

// ============================================
// Interactive Button Press Effect
// ============================================
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('mousedown', () => {
    btn.style.transform = 'translateY(2px) scale(0.97)';
  });
  btn.addEventListener('mouseup', () => {
    btn.style.transform = '';
  });
  btn.addEventListener('mouseleave', () => {
    btn.style.transform = '';
  });
});

// ============================================
// Search Input Glow Pulse
// ============================================
const searchInput = document.getElementById('q');
if (searchInput) {
  searchInput.addEventListener('focus', () => {
    searchInput.parentElement.classList.add('searching');
  });
  searchInput.addEventListener('blur', () => {
    searchInput.parentElement.classList.remove('searching');
  });
}

// ============================================
// Stats Counter Animation
// ============================================
function animateCounter() {
  const stats = document.getElementById('stats');
  if (!stats) return;
  const text = stats.textContent;
  const match = text.match(/(\d+)/);
  if (match) {
    const target = parseInt(match[1]);
    let current = 0;
    const step = Math.ceil(target / 20);
    const interval = setInterval(() => {
      current += step;
      if (current >= target) {
        current = target;
        clearInterval(interval);
      }
      stats.textContent = text.replace(match[1], current);
    }, 50);
  }
}

// Run after page load
setTimeout(animateCounter, 600);
</script>
</body>
</html>
