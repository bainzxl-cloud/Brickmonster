<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Browse LEGO listings. Search, filter, and sort. No checkout — DM to buy." />
  <title>brickmonster — LEGO for Sale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles_new.css" />
</head>
<body>
  <!-- Floating decorative elements -->
  <div class="bg-decor" aria-hidden="true">
    <div class="bg-decor__shape bg-decor__shape--1"></div>
    <div class="bg-decor__shape bg-decor__shape--2"></div>
    <div class="bg-decor__shape bg-decor__shape--3"></div>
  </div>

  <header class="header">
    <div class="container header__inner">
      <a href="/" class="brand">
        <div class="brand__icon">
          <svg viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="50" height="50" rx="12" fill="url(#grad)"/>
            <rect x="10" y="10" width="14" height="14" rx="3" fill="#fff"/>
            <rect x="30" y="10" width="14" height="14" rx="3" fill="#FFE66D"/>
            <rect x="10" y="30" width="14" height="14" rx="3" fill="#4ECDC4"/>
            <rect x="30" y="30" width="14" height="14" rx="3" fill="#FF6B6B"/>
            <defs>
              <linearGradient id="grad" x1="0" y1="0" x2="54" y2="54">
                <stop offset="0%" stop-color="#FF6B6B"/>
                <stop offset="50%" stop-color="#FFE66D"/>
                <stop offset="100%" stop-color="#4ECDC4"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="brand__text">
          <h1 id="siteTitle" class="brand__title">brickmonster</h1>
          <p id="siteSubtitle" class="brand__sub">LEGO for sale • Toronto</p>
        </div>
      </a>
      
      <nav class="nav">
        <a id="igLink" class="nav__link" href="#" target="_blank" rel="noopener">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="18" cy="6" r="1.5" fill="currentColor" stroke="none"/></svg>
          <span>Instagram</span>
        </a>
        <a id="emailLink" class="nav__link" href="mailto:bainzxl@gmail.com">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
          <span>Email</span>
        </a>
        <a id="dmLink" class="btn btn--primary" href="#">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          DM Me
        </a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h2 class="hero__title">Build your collection</h2>
      <p class="hero__sub">Premium LEGO sets & minifigures from Toronto</p>
    </section>

    <section class="controls" aria-label="Search and filters">
      <div class="search-bar">
        <svg class="search-bar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input id="q" class="search-bar__input" type="search" placeholder="Search sets, minifigures, tags…" autocomplete="off" />
      </div>

      <div class="filters">
        <div class="filters__row">
          <label class="filter">
            <span class="filter__label">Category</span>
            <select id="category" class="filter__select" aria-label="Category">
              <option value="">All</option>
            </select>
          </label>

          <label class="filter">
            <span class="filter__label">Condition</span>
            <select id="condition" class="filter__select" aria-label="Condition">
              <option value="">Any</option>
            </select>
          </label>

          <label class="filter">
            <span class="filter__label">Series</span>
            <select id="series" class="filter__select" aria-label="Series">
              <option value="">All series</option>
            </select>
          </label>
        </div>

        <div class="filters__row filters__row--2">
          <label class="filter filter--price">
            <span class="filter__label">Price</span>
            <div class="price-range">
              <input id="priceMin" class="filter__input" inputmode="numeric" placeholder="Min" />
              <span class="price-range__sep">—</span>
              <input id="priceMax" class="filter__input" inputmode="numeric" placeholder="Max" />
            </div>
          </label>

          <label class="filter filter--check">
            <input id="inStockOnly" type="checkbox" />
            <span class="filter__checkbox">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
            </span>
            <span>In stock only</span>
          </label>

          <label class="filter">
            <span class="filter__label">Sort</span>
            <select id="sort" class="filter__select" aria-label="Sort">
              <option value="newest">Newest</option>
              <option value="price_asc">Price: low → high</option>
              <option value="price_desc">Price: high → low</option>
            </select>
          </label>

          <button id="clear" class="btn btn--ghost btn--sm" type="button">Clear all</button>
        </div>
      </div>
    </section>

    <section>
      <div class="results-bar">
        <div id="stats" class="results-bar__count" aria-live="polite"></div>
        <div id="activeFilters" class="chips" aria-label="Active filters"></div>
      </div>
      <div id="grid" class="grid" aria-label="Listings"></div>
      <div id="empty" class="empty" hidden>
        <div class="empty__icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9l6 6M15 9l-6 6"/></svg>
        </div>
        <p class="empty__text">No listings found</p>
        <p class="empty__sub">Try adjusting your filters</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__brand">
        <span class="footer__logo">🧱</span>
        <span>Questions? Email <a class="link" href="mailto:bainzxl@gmail.com">bainzxl@gmail.com</a></span>
      </div>
      <div class="footer__location">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Toronto, Canada
      </div>
    </div>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
